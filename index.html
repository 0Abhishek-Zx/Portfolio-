<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abhishek's Portfolio</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 transition-colors duration-300">
  <div id="root" class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6"></div>

<script type="text/babel">
const projects = [
  {
    title: "Dynamic Game Review Web Application",
    live: "http://phpajaxproject.infinityfreeapp.com/Web_pages/index.php",
    code: "https://github.com/0Abhishek-Zx/Dynamic-website-",
    description: "Developed a full-stack web application using JavaScript, PHP, MySQL, Apache, AJAX, and the Steam API. Enabled users to browse thousands of games from the Steam library via API integration. Implemented functionality for users to add games to a dynamic database either automatically via API or manually."
  },
  {
    title: "Web-Based Resume",
    live: "https://0abhishek-zx.github.io/Web_Resume/",
    code: "https://github.com/0abhishek-zx/Web_Resume",
    description: "Created a responsive web resume using HTML and CSS Grid, optimized for both mobile and desktop views. Applied design principles and maintained consistent formatting for improved user experience."
  },
  {
    title: "Checkers Game",
    live: "https://0abhishek-zx.github.io/ChessLiteJs/",
    code: "https://github.com/0abhishek-zx/ChessLiteJs",
    description: "Developed a browser-based checkers-style game using JavaScript, HTML, and CSS. Applied object-oriented programming principles to manage piece movement, board state, and overall game logic."
  },
  {
    title: "Babylon.js Animation Site",
    live: "https://0abhishek-zx.github.io/3DAnimationBabylon/",
    code: "https://github.com/0abhishek-zx/3DAnimationBabylon",
    description: "Developed an interactive 3D website simulating moons orbiting Saturn using Babylon.js and JavaScript. Implemented realistic animations with precise camera controls, texture mapping, and lighting effects."
  },
  {
    title: "Gaming Channel Content",
    live: "https://www.youtube.com/@Ambivert_04",
    code: "",
    description: "Produced short gaming videos generating 1,000+ views using Filmora and GIMP. Applied transitions, audio syncing, visual enhancements, and designed thumbnails to increase viewer engagement."
  }
];

const ProjectCard = ({title, live, code, description}) => (
  <div className="bg-white p-5 rounded-xl shadow hover:bg-blue-50 transition flex flex-col justify-between">
    <div>
      <h3 className="text-lg sm:text-xl font-semibold">{title}</h3>
      {description && <p className="mt-2 text-gray-600 text-sm sm:text-base">{description}</p>}
    </div>

    <div className="flex flex-wrap gap-3 mt-4">
      {live && 
        <a
          href={live}
          target="_blank"
          rel="noopener noreferrer"
          className="flex-1 sm:flex-none text-center px-4 py-2 border-2 border-blue-500 text-blue-500 rounded-lg hover:bg-blue-500 hover:text-white transition"
        >
          Live
        </a>
      }

      {code && 
        <a
          href={code}
          target="_blank"
          rel="noopener noreferrer"
          className="flex-1 sm:flex-none text-center px-4 py-2 border-2 border-gray-700 text-gray-700 rounded-lg hover:bg-gray-700 hover:text-white transition"
        >
          Code
        </a>
      }
    </div>
  </div>
);

const App = () => {
  return (
    <div>
      {/* Header */}
      <h1 className="text-2xl sm:text-3xl font-bold border-b-2 pb-2 mb-6 text-center">
        Abhishek's Portfolio
      </h1>

      {/* About Me + Contact */}
      <div className="bg-white p-6 rounded-xl shadow mb-6 flex flex-col md:flex-row md:justify-between gap-6">
        <div className="md:flex-1">
          <h2 className="text-xl font-semibold mb-2">About Me</h2>
          <p className="text-gray-600 text-sm sm:text-base">
            I am a Computer Science student passionate about full-stack development, skilled in building dynamic and scalable web applications. I have experience with frontend and backend technologies, networking, and creative media tools. Adaptable and motivated to learn, I am seeking opportunities to contribute as a web developer.
          </p>
        </div>
        <div className="md:flex-1">
          <h2 className="text-xl font-semibold mb-2">Contact</h2>
          <p className="text-gray-600 text-sm sm:text-base">
            <span className="font-semibold">Email:</span> abhishekmac70@gmail.com<br/>
            <span className="font-semibold">GitHub:</span> 
            <a href="https://github.com/0abhishek-zx" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline ml-1">
              0abhishek-zx
            </a>
          </p>
        </div>
      </div>

      {/* Projects Section */}
      <h2 className="text-lg sm:text-xl font-semibold mb-4">
        Projects
      </h2>

      <div className="flex flex-col gap-6">
        {projects.map(p => <ProjectCard key={p.title} {...p} />)}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</html>
