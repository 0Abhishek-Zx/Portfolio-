<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abhishek's Portfolio</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 transition-colors duration-300">
  <div id="root" class="max-w-4xl mx-auto px-6 py-8"></div>

<script type="text/babel">

const projects = [
  {
    title: "Dynamic Game Review Web Application",
    live: "http://phpajaxproject.infinityfreeapp.com/Web_pages/index.php",
    code: "",
    description: "Full-stack app using PHP, MySQL, Apache, and AJAX. Users can add, edit, and review games with real-time updates."
  },
  {
    title: "Web-Based Resume",
    live: "https://0abhishek-zx.github.io/Web_Resume/",
    code: "https://github.com/0abhishek-zx/Web_Resume",
    description: "Responsive personal resume website using HTML and CSS Grid, optimized for mobile and desktop."
  },
  {
    title: "Checkers Game",
    live: "https://0abhishek-zx.github.io/ChessLiteJs/",
    code: "https://github.com/0abhishek-zx/ChessLiteJs",
    description: "Browser-based Checkers game using JavaScript, HTML, and CSS with OOP concepts for game logic."
  },
  {
    title: "Babylon.js Animation Site",
    live: "https://0abhishek-zx.github.io/3DAnimationBabylon/",
    code: "https://github.com/0abhishek-zx/3DAnimationBabylon",
    description: "Website incorporating 3D animation using Babylon.js and JavaScript libraries."
  },
  {
    title: "Gaming Channel Content",
    live: "https://www.youtube.com/@Ambivert_04",
    code: "",
    description: "Created short gaming videos using Filmora and GIMP with transitions, audio syncing, and thumbnails."
  }
];

const ProjectCard = ({title, live, code, description}) => (
  <div className="bg-white p-5 my-4 rounded-xl shadow hover:bg-blue-50 transition">
    
    <h3 className="text-xl font-semibold">{title}</h3>

    {description && <p className="mt-2 text-gray-700">{description}</p>}

    <div className="flex gap-3 mt-4">
      {live && 
        <a
          href={live}
          target="_blank"
          rel="noopener noreferrer"
          className="px-4 py-2 border-2 border-blue-500 text-blue-500 rounded-lg hover:bg-blue-500 hover:text-white transition"
        >
          Live
        </a>
      }

      {code && 
        <a
          href={code}
          target="_blank"
          rel="noopener noreferrer"
          className="px-4 py-2 border-2 border-gray-700 text-gray-700 rounded-lg hover:bg-gray-700 hover:text-white transition"
        >
          View Code
        </a>
      }
    </div>

  </div>
);

const App = () => {
  return (
    <div>
      <h1 className="text-3xl font-bold border-b-2 pb-2 mb-6">
        Abhishek's Portfolio
      </h1>

      <h2 className="text-xl font-semibold mb-4">
        Projects
      </h2>

      {projects.map(p => <ProjectCard key={p.title} {...p} />)}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

</body>
</html>
